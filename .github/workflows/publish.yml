name: Publish to npm

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Tipo de versión a publicar'
        required: true
        type: choice
        options:
          - major
          - minor
          - fix
          - dev
        default: 'fix'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm-publish

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
          token: ${{ secrets.PAT_TOKEN }}

      - name: Setup Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Bump version and commit
        id: version
        run: |
          if [ "${{ github.event.inputs.bump_type }}" == "dev" ]; then
            CURRENT_VERSION=$(node -p "require('./package.json').version")
            if [[ "$CURRENT_VERSION" == *"-dev."* ]]; then
              npm version prerelease --preid=dev -m "chore(release): %s"
            else
              npm version prepatch --preid=dev -m "chore(release): %s"
            fi
            echo "is_dev=true" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.inputs.bump_type }}" == "fix" ]; then
            npm version patch -m "chore(release): %s"
            echo "is_dev=false" >> "$GITHUB_OUTPUT"
          else
            npm version ${{ github.event.inputs.bump_type }} -m "chore(release): %s"
            echo "is_dev=false" >> "$GITHUB_OUTPUT"
          fi
          
          # Extraer el nuevo tag generado
          NEW_TAG=$(git describe --tags --abbrev=0)
          echo "tag=$NEW_TAG" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: npx vitest run

      - name: Build package
        run: pnpm run build

      - name: Publish to npm
        run: |
          if [ "${{ steps.version.outputs.is_dev }}" == "true" ]; then
            npm publish --tag dev
          else
            npm publish
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Push commit and tag
        run: git push --follow-tags

      - name: Create GitHub Release
        if: ${{ steps.version.outputs.is_dev == 'false' }}
        run: gh release create ${{ steps.version.outputs.tag }} --generate-notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}