name: Publish to npm

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Verify commit on `main`, valid tag, and unpublished version
        id: verify
        shell: bash
        run: |
          set -uo pipefail
          git fetch --prune --tags origin main

          commit_sha="${GITHUB_SHA}"
          if commit_sha_resolved=$(git rev-parse --verify "${GITHUB_REF}^{}" 2>/dev/null); then
            commit_sha="$commit_sha_resolved"
          fi
          echo "Commit to verify: $commit_sha"

          # 1. Check tag matching v* pointing at commit
          tag=$(git tag --points-at "$commit_sha" --list 'v*' | head -n1 || true)
          if [ -z "$tag" ]; then
            echo "Error: No tag matching v* points at commit $commit_sha"
            exit 1
          fi
          echo "Found tag: $tag"

          # 2. Check commit is contained in origin/main
          if ! git merge-base --is-ancestor "$commit_sha" origin/main; then
            echo "Error: Commit $commit_sha is not in origin/main"
            exit 1
          fi
          echo "Commit $commit_sha is in origin/main"

          # 3. Check if version is already published on npm
          pkg_name=$(node -p "require('./package.json').name")
          pkg_version=$(node -p "require('./package.json').version")
          echo "Checking npm registry for $pkg_name@$pkg_version..."

          if npm view "$pkg_name@$pkg_version" version >/dev/null 2>&1; then
            echo "Error: Version $pkg_version of $pkg_name is already published on npm!"
            exit 1
          fi
          echo "Version $pkg_version is not published yet."

          echo "should_publish=true" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        if: ${{ steps.verify.outputs.should_publish == 'true' }}
        run: pnpm install --frozen-lockfile

      - name: Build package
        if: ${{ steps.verify.outputs.should_publish == 'true' }}
        run: pnpm run build

      - name: Publish to npm
        if: ${{ steps.verify.outputs.should_publish == 'true' }}
        run: pnpm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}